name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: LEMNISCATE-linux
          - os: windows-latest
            artifact: LEMNISCATE-windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 libegl1 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xkb1 \
            libxkbcommon-x11-0 libnss3 libxss1 libasound2 libgbm1 \
            libxcomposite1 libxdamage1 libxfixes3 libxrandr2

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller LEMNISCATE.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/LEMNISCATE/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: LEMNISCATE-linux
          path: dist/linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: LEMNISCATE-windows
          path: dist/windows

      - name: Zip artifacts
        run: |
          cd dist && zip -r LEMNISCATE-linux.zip linux/
          cd dist && zip -r LEMNISCATE-windows.zip windows/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/LEMNISCATE-linux.zip
            dist/LEMNISCATE-windows.zip
