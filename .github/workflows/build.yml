name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ── Portable single-file binary ────────────────────────────────────────
  portable:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: LEMNISCATE-linux-portable
            binary: LEMNISCATE
          - os: windows-latest
            artifact: LEMNISCATE-windows-portable
            binary: LEMNISCATE.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 libegl1 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xkb1 \
            libxkbcommon-x11-0 libnss3 libxss1 libasound2 libgbm1 \
            libxcomposite1 libxdamage1 libxfixes3 libxrandr2

      - run: pip install -r requirements.txt pyinstaller

      - run: pyinstaller LEMNISCATE.spec

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.binary }}

  # ── Windows installer (.exe setup) ────────────────────────────────────
  installer-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt pyinstaller

      - run: pyinstaller LEMNISCATE-installer.spec

      - name: Build NSIS installer
        run: |
          choco install nsis -y
          cd installer
          makensis windows.nsi

      - uses: actions/upload-artifact@v4
        with:
          name: LEMNISCATE-windows-setup
          path: installer/LEMNISCATE-setup.exe

  # ── Linux AppImage ─────────────────────────────────────────────────────
  installer-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 libegl1 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xkb1 \
            libxkbcommon-x11-0 libnss3 libxss1 libasound2 libgbm1 \
            libxcomposite1 libxdamage1 libxfixes3 libxrandr2

      - run: pip install -r requirements.txt pyinstaller

      - run: pyinstaller LEMNISCATE-installer.spec

      - name: Build AppImage
        run: |
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons
          cp -r dist/LEMNISCATE/* AppDir/usr/bin/
          cp assets/logo_dark.png AppDir/usr/share/icons/lemniscate.png
          cp assets/logo_dark.png AppDir/lemniscate.png

          cat > AppDir/lemniscate.desktop << 'EOF'
          [Desktop Entry]
          Name=LEMNISCATE
          Exec=LEMNISCATE
          Icon=lemniscate
          Type=Application
          Categories=Utility;
          EOF

          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "$HERE/usr/bin/LEMNISCATE" "$@"
          EOF
          chmod +x AppDir/AppRun

          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir LEMNISCATE-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: LEMNISCATE-linux-appimage
          path: LEMNISCATE-x86_64.AppImage

  # ── GitHub Release ─────────────────────────────────────────────────────
  release:
    needs: [portable, installer-windows, installer-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/LEMNISCATE-linux-portable/LEMNISCATE
            artifacts/LEMNISCATE-windows-portable/LEMNISCATE.exe
            artifacts/LEMNISCATE-windows-setup/LEMNISCATE-setup.exe
            artifacts/LEMNISCATE-linux-appimage/LEMNISCATE-x86_64.AppImage
