name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1 libegl1 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-xinerama0 libxcb-xkb1 \
            libxkbcommon-x11-0 libnss3 libxss1 libasound2t64 libgbm1 \
            libxcomposite1 libxdamage1 libxfixes3 libxrandr2

      - run: pip install -r requirements.txt pyinstaller

      - name: Build portable binary
        run: pyinstaller LEMNISCATE.spec

      - uses: actions/upload-artifact@v4
        with:
          name: LEMNISCATE-linux-portable
          path: dist/LEMNISCATE

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt pyinstaller

      - name: Build portable binary
        run: pyinstaller LEMNISCATE.spec

      - uses: actions/upload-artifact@v4
        with:
          name: LEMNISCATE-windows-portable
          path: dist/LEMNISCATE.exe

      - name: Build installer
        run: |
          choco install nsis --yes
          pyinstaller LEMNISCATE-installer.spec
          $env:PATH += ";C:\Program Files (x86)\NSIS"
          cd installer
          makensis windows.nsi

      - uses: actions/upload-artifact@v4
        with:
          name: LEMNISCATE-windows-setup
          path: installer/LEMNISCATE-setup.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/LEMNISCATE-linux-portable/LEMNISCATE
            artifacts/LEMNISCATE-windows-portable/LEMNISCATE.exe
            artifacts/LEMNISCATE-windows-setup/LEMNISCATE-setup.exe
